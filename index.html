        const getWeatherDesc = (code) => {
          if (code === 0) return '晴朗';
          if (code >= 1 && code <= 3) return '多雲';
          if (code >= 45 && code <= 48) return '有霧';
          if (code >= 51 && code <= 67) return '有雨';
          if (code >= 71) return '有雪';
          if (code >= 80 && code <= 99) return '雷雨';
          return '晴朗';
        };

        function App() {

            if (auth) {

                  try {
                    await signInAnonymously(auth);
                  } catch (error) {
                    console.error("Auth failed:", error);
                  }
                };
                initAuth();
                const unsubscribeAuth = onAuthStateChanged(auth, setUser);
                return () => unsubscribeAuth();
            }
          }, []);

          useEffect(() => {
            const fetchData = async () => {
              setLoading(true);
              let weatherInfo = { temp: 20, desc: "晴朗" }; 
              let rateInfo = 0.21; 

              try {
                const weatherRes = await fetch('https://api.open-meteo.com/v1/forecast?latitude=33.5904&longitude=130.4017&current_weather=true&timezone=Asia%2FTokyo');
                if (weatherRes.ok) {
                    const weatherJson = await weatherRes.json();
                    if (weatherJson.current_weather) {
                        weatherInfo = {
                            temp: Math.round(weatherJson.current_weather.temperature),
                            desc: getWeatherDesc(weatherJson.current_weather.weathercode)
                        };
                    }
                }
              } catch (error) {
                console.warn("Weather API fetch failed", error);
              }

              try {
                const rateRes = await fetch('https://api.frankfurter.app/latest?from=JPY&to=TWD');
                if (rateRes.ok) {
                    const rateJson = await rateRes.json();
                    if (rateJson?.rates?.TWD) {
                        rateInfo = rateJson.rates.TWD;
                    }
                }
              } catch (error) {
                 console.warn("Exchange Rate API fetch failed", error);
              }

              setWeatherData(weatherInfo);
              setExchangeRate(rateInfo);
              setLoading(false);
            };

            fetchData();
          }, []);

          useEffect(() => {
            if (!user || !db) return;
            const checklistDocRef = doc(db, 'artifacts', appId, 'public', 'data', 'lists', 'checklist_shared');

            const unsubscribeSnapshot = onSnapshot(checklistDocRef, (docSnap) => {
              if (docSnap.exists()) {
                const data = docSnap.data();
                if (data.items && Array.isArray(data.items)) {
                  const mergedList = initialChecklistData.map(item => {
                    const savedItem = data.items.find(s => s.id === item.id);
                    return savedItem ? { ...item, checked: savedItem.checked } : item;
                  });
                  setChecklist(mergedList);
                }
              } else {
                const initialSaveData = initialChecklistData.map(({ id, checked }) => ({ id, checked }));
                setDoc(checklistDocRef, { items: initialSaveData }, { merge: true })
                  .catch(err => console.error("Failed to init checklist doc", err));
              }
            }, (error) => {
              console.error("Firestore snapshot error:", error);
            });

            return () => unsubscribeSnapshot();
          }, [user]);

          const toggleCheck = async (id) => {
            const newChecklist = checklist.map(item => 
              item.id === id ? { ...item, checked: !item.checked } : item
            );
            setChecklist(newChecklist);

            if (!user || !db) return;
            try {
                const checklistDocRef = doc(db, 'artifacts', appId, 'public', 'data', 'lists', 'checklist_shared');
                const dataToSave = newChecklist.map(({ id, checked }) => ({ id, checked }));
                await setDoc(checklistDocRef, { items: dataToSave }, { merge: true });
            } catch (err) {
                console.error("Failed to save checklist", err);
            }
          };

          const toggleChecklistExpand = (id) => setExpandedChecklistId(expandedChecklistId === id ? null : id);
          const toggleItineraryExpand = (id) => setExpandedItineraryId(expandedItineraryId === id ? null : id);
          const toggleGuideExpand = (idx) => setExpandedGuideIds(prev => ({ ...prev, [idx]: !prev[idx] }));
          
          const calculateProgress = () => {
            const done = checklist.filter(i => i.checked).length;
            return Math.round((done / checklist.length) * 100);
          };

          const FlightsView = () => (
            <div className="space-y-6 pb-24 px-4 pt-6">
              <div className="flex p-1 bg-[#E0CFC3]/30 rounded-xl mb-6 shadow-inner border border-[#E0CFC3]">
                <button 
                  onClick={() => setFlightView('me')}
                  className={`flex-1 py-2.5 text-sm font-bold rounded-lg transition-all flex items-center justify-center gap-2 ${
                    flightView === 'me' ? 'bg-[#2B3445] text-[#E0CFC3] shadow-md transform scale-[1.02]' : 'text-[#2B3445]/60 hover:text-[#2B3445]'
                  }`}
                >
                  <User className="w-4 h-4" /> 詡歷
                </button>
                <button 
                  onClick={() => setFlightView('others')}
                  className={`flex-1 py-2.5 text-sm font-bold rounded-lg transition-all flex items-center justify-center gap-2 ${
                    flightView === 'others' ? 'bg-[#E94D34] text-white shadow-md transform scale-[1.02]' : 'text-[#2B3445]/60 hover:text-[#E94D34]'
                  }`}
                >
                  <Users className="w-4 h-4" /> 蔬琪、雅雅
                </button>
              </div>

              <div className="space-y-4 min-h-[300px]">
                {flightView === 'me' ? (
                  <div className="space-y-4">
                     <div className="flex items-center gap-2 mb-2 ml-1">
                        <span className="w-2 h-2 rounded-full bg-[#2B3445]"></span>
                        <span className="text-xs font-bold text-[#2B3445] uppercase tracking-wider">去程 Outbound</span>
                     </div>
                     <FlightInfoBlock flight={flightData.outbound} type="outbound" />
                     
                     <div className="bg-[#E94D34]/10 border border-[#E94D34]/30 rounded-lg p-3 my-3">
                        <div className="flex items-center gap-2 mb-2">
                            <AlertTriangle className="w-4 h-4 text-[#E94D34]" />
                            <span className="text-sm font-bold text-[#E94D34]">重要提醒</span>
                        </div>
                        <div className="space-y-2">
                            <a href="https://www.vjw.digital.go.jp/main/#/vjwplo001" target="_blank" rel="noreferrer" className="flex items-center justify-between bg-white/50 p-2 rounded hover:bg-white transition-colors cursor-pointer group">
                                <span className="text-xs font-medium text-[#2B3445] flex items-center gap-2">
                                    <span className="w-1.5 h-1.5 rounded-full bg-[#E94D34]"></span>
                                    入境表單 (起飛前6hr)
                                </span>
                                <ExternalLink className="w-3 h-3 text-[#2B3445]/40 group-hover:text-[#E94D34]" />
                            </a>
                            <div className="flex items-center justify-between bg-white/50 p-2 rounded">
                                <span className="text-xs font-medium text-[#2B3445] flex items-center gap-2">
                                    <span className="w-1.5 h-1.5 rounded-full bg-[#E94D34]"></span>
                                    旅平險生效確認
                                </span>
                            </div>
                        </div>
                     </div>

                     <div className="flex items-center gap-2 mb-2 mt-6 ml-1">
                        <span className="w-2 h-2 rounded-full bg-[#E94D34]"></span>
                        <span className="text-xs font-bold text-[#E94D34] uppercase tracking-wider">回程 Inbound</span>
                     </div>
                     <FlightInfoBlock flight={flightData.inbound.user} type="inbound" />
                  </div>
                ) : (
                  <div className="space-y-4">
                     <div className="flex items-center gap-2 mb-2 ml-1">
                        <span className="w-2 h-2 rounded-full bg-[#2B3445]"></span>
                        <span className="text-xs font-bold text-[#2B3445] uppercase tracking-wider">去程 Outbound</span>
                     </div>
                     <FlightInfoBlock flight={flightData.outbound} type="outbound" />
                     
                     <div className="flex items-center gap-2 mb-2 mt-6 ml-1">
                        <span className="w-2 h-2 rounded-full bg-[#E94D34]"></span>
                        <span className="text-xs font-bold text-[#E94D34] uppercase tracking-wider">回程 Inbound</span>
                     </div>
                     <FlightInfoBlock flight={flightData.inbound.others} type="inbound" />
                  </div>
                )}
              </div>
            </div>
          );

          const ItineraryView = () => (
            <div className="space-y-4 pb-24">
              <div className="bg-[#2B3445] text-[#E0CFC3] p-6 rounded-b-[2rem] shadow-lg mb-6 border-b-4 border-[#E94D34]">
                <h1 className="text-2xl font-bold mb-1">每日行程 🗓️</h1>
                <p className="text-[#E0CFC3]/80 text-sm">福岡 • 由布院 • 阿蘇火山</p>
              </div>
              
              <div className="px-4 space-y-4">
                {itineraryData.map((day) => (
                  <Card key={day.day} className="relative group">
                    <div className={`absolute top-0 left-0 w-1.5 h-full ${day.highlight ? 'bg-[#E94D34]' : 'bg-[#2B3445]'}`}></div>
                    <div className="p-4 pl-6">
                      <div className="flex justify-between items-start mb-2">
                        <div>
                          <div className="flex items-center gap-2 mb-1">
                            <span className="text-xs font-bold text-[#2B3445]/50 uppercase tracking-wider">Day {day.day}</span>
                            <span className="text-xs font-bold text-[#2B3445]/70">{day.date}</span>
                          </div>
                          <h3 className="text-lg font-bold text-[#2B3445]">{day.title}</h3>
                        </div>
                        {day.transport.includes("CAR") || day.transport.includes("自駕") ? (
                          <Car className="w-5 h-5 text-[#E94D34]" />
                        ) : (
                          <MapPin className="w-5 h-5 text-[#E0CFC3]" />
                        )}
                      </div>
                      
                      <div className="space-y-3 mt-3">
                        {day.activities.map((act, idx) => {
                          const itemId = `${day.day}-${idx}`;
                          return (
                            <div key={idx} className="flex flex-col">
                              <div className="flex gap-3 text-sm items-start">
                                <span className="text-[#2B3445]/50 min-w-[3rem] text-xs pt-0.5 font-mono">{act.time}</span>
                                <div className="flex-1">
                                  <span className="text-[#2B3445] font-medium flex items-center gap-2">
                                    {act.link && !act.dropdown ? (
                                      <a href={act.link} target="_blank" rel="noopener noreferrer" className="hover:text-[#E94D34] hover:underline flex items-center gap-1">
                                        {act.event} <MapPin className="w-3 h-3 inline" />
                                      </a>
                                    ) : ( act.event )}
                                    {act.dropdown && (
                                      <button onClick={() => toggleItineraryExpand(itemId)} className="p-1 rounded-full bg-[#F5EFE9] text-[#2B3445] hover:bg-[#E0CFC3] transition-colors">
                                        {expandedItineraryId === itemId ? <ChevronUp className="w-3 h-3" /> : <ChevronDown className="w-3 h-3" />}
                                      </button>
                                    )}
                                  </span>
                                  {act.dropdown && expandedItineraryId === itemId && (
                                    <div className="mt-2 bg-[#F5EFE9] rounded-lg border border-[#E0CFC3] p-2">
                                      {act.dropdown.map((dropItem, dropIdx) => (
                                        <div key={dropIdx} className="py-1">
                                          {dropItem.link ? (
                                            <a href={dropItem.link} target="_blank" rel="noopener noreferrer" className="flex items-center gap-2 text-xs font-bold text-[#E94D34] hover:underline">
                                              <MapPin className="w-3 h-3" /> {dropItem.text}
                                            </a>
                                          ) : (
                                            <p className="text-xs text-[#2B3445]/80 leading-relaxed pl-1 border-l-2 border-[#E94D34]">{dropItem.text}</p>
                                          )}
                                        </div>
                                      ))}
                                    </div>
                                  )}
                                </div>
                              </div>
                            </div>
                          );
                        })}
                      </div>

                      <div className="mt-4 pt-3 border-t border-[#E0CFC3]/50 flex gap-2 overflow-x-auto no-scrollbar">
                        <Badge variant="beige">{day.stay}</Badge>
                        {day.highlight && <Badge variant="outlineVermilion">★ {day.highlight}</Badge>}
                      </div>
                    </div>
                  </Card>
                ))}
              </div>
            </div>
          );

          const NotesView = () => (
            <div className="space-y-4 pb-24 px-4 pt-6">
              <h2 className="text-xl font-bold text-[#2B3445] mb-4 flex items-center gap-2">
                <Info className="w-5 h-5 text-[#E94D34]" /> 注意事項 & 工具
              </h2>
              
              <Card className="bg-[#F5EFE9] border-[#E0CFC3] cursor-pointer mb-6 hover:border-[#E94D34] transition-colors">
                <div className="p-5" onClick={() => setShowVegCard(true)}>
                  <div className="flex items-center gap-3 mb-3">
                    <div className="p-2 bg-[#E0CFC3] rounded-full text-[#2B3445]">
                      <Utensils className="w-6 h-6" />
                    </div>
                    <div>
                      <h3 className="font-bold text-[#2B3445]">飲食溝通卡</h3>
                      <p className="text-xs text-[#2B3445]/60">點擊放大顯示給店員</p>
                    </div>
                  </div>
                  <p className="text-sm text-[#2B3445]/80 bg-white p-3 rounded border border-[#E0CFC3] italic">
                    "不好意思，有蔥、洋蔥還有大蒜嗎..."
                  </p>
                </div>
              </Card>

              <div className="grid gap-3 mt-4">
                {driveGuideData.map((guide, idx) => {
                   const isToggleable = Array.isArray(guide.content); 
                   const isExpanded = expandedGuideIds[idx] !== undefined ? expandedGuideIds[idx] : !isToggleable; 
                   return (
                  <Card key={idx}>
                    <div className="p-4">
                      <div className="flex items-center justify-between mb-2 cursor-pointer" onClick={() => isToggleable && toggleGuideExpand(idx)}>
                        <div className="flex items-center gap-3">
                          <div className="p-2 bg-[#E0CFC3]/30 rounded-full">{guide.icon}</div>
                          <h3 className="font-bold text-[#2B3445]">{guide.title}</h3>
                        </div>
                        {isToggleable && (
                          <div className="text-[#2B3445]/60">
                            {isExpanded ? <ChevronUp className="w-5 h-5" /> : <ChevronDown className="w-5 h-5" />}
                          </div>
                        )}
                      </div>
                      
                      {isExpanded && (
                      <div className="pl-[3.25rem]">
                        {Array.isArray(guide.content) ? (
                          <div className="space-y-4 mt-2">
                            {guide.content.map((item, i) => (
                              <div key={i} className="relative">
                                <div className="flex items-baseline gap-1.5">
                                    <span className="text-[#E94D34] font-black text-sm">{i + 1}.</span>
                                    <span className="font-bold text-[#2B3445] text-sm">{item.title}</span>
                                </div>
                                <p className="text-xs text-[#2B3445]/70 mt-1 pl-4 leading-relaxed">{item.desc}</p>
                              </div>
                            ))}
                          </div>
                        ) : (
                          <p className="text-sm text-[#2B3445]/70 leading-relaxed">{guide.content}</p>
                        )}
                      </div>
                      )}
                    </div>
                  </Card>
                )})}
              </div>
            </div>
          );

          const ChecklistView = () => (
            <div className="space-y-4 pb-24 px-4 pt-6">
              <div className="flex justify-between items-end mb-4">
                <h2 className="text-xl font-bold text-[#2B3445] flex items-center gap-2">
                    <CheckSquare className="w-5 h-5 text-[#E94D34]" /> 待辦事項
                </h2>
                <span className="text-sm font-bold text-[#E94D34]">{calculateProgress()}% 完成</span>
              </div>

              <div className="w-full bg-[#E0CFC3] rounded-full h-2.5 mb-6">
                <div className="bg-[#2B3445] h-2.5 rounded-full transition-all duration-500" style={{ width: `${calculateProgress()}%` }}></div>
              </div>

              <div className="space-y-2">
                {checklist.map((item) => (
                  <div key={item.id} onClick={() => toggleCheck(item.id)}
                    className={`flex flex-col p-4 rounded-xl border transition-all cursor-pointer select-none ${
                      item.checked ? 'bg-[#E0CFC3]/30 border-transparent' : 'bg-white border-[#E0CFC3] hover:border-[#2B3445]'
                    }`}
                  >
                    <div className="flex items-center w-full">
                      <div className={`flex-shrink-0 w-5 h-5 rounded border flex items-center justify-center mr-3 transition-colors ${
                        item.checked ? 'bg-[#2B3445] border-[#2B3445]' : 'border-[#E0CFC3]'
                      }`}>
                        {item.checked && <CheckSquare className="w-3.5 h-3.5 text-[#E0CFC3]" />}
                      </div>
                      <div className="flex-1">
                        <p className={`text-sm font-bold ${item.checked ? 'text-[#2B3445]/40 line-through' : 'text-[#2B3445]'}`}>{item.text}</p>
                      </div>
                      {item.details && (
                        <button onClick={(e) => { e.stopPropagation(); toggleChecklistExpand(item.id); }} className="p-1 ml-2 text-[#2B3445]/60 hover:text-[#E94D34] transition-colors">
                          {expandedChecklistId === item.id ? <ChevronUp className="w-4 h-4" /> : <ChevronDown className="w-4 h-4" />}
                        </button>
                      )}
                    </div>

                    <div className="flex items-center justify-between mt-1 pl-8">
                      <span className="text-[10px] text-[#2B3445]/60 bg-[#E0CFC3]/30 px-1.5 py-0.5 rounded inline-block">{item.category}</span>
                      {item.link && (
                          <a href={item.link} target="_blank" rel="noopener noreferrer" onClick={(e) => e.stopPropagation()} className="flex items-center gap-1 text-[10px] font-bold text-[#E94D34] bg-[#F5EFE9] px-2 py-1 rounded-full hover:bg-[#E0CFC3]/50 transition-colors">
                              🔗 開啟連結
                          </a>
                      )}
                    </div>

                    {expandedChecklistId === item.id && item.details && (
                        <div className="mt-3 pl-8 text-xs text-[#2B3445]/80 bg-[#F5EFE9] p-3 rounded-lg border border-[#E0CFC3]">
                            {item.details.map((detail, idx) => (
                                <p key={idx} className="mb-1 leading-relaxed">{detail}</p>
                            ))}
                        </div>
                    )}
                  </div>
                ))}
              </div>
            </div>
          );

          return (
            <div className="bg-[#E0CFC3] min-h-screen font-sans max-w-md mx-auto relative shadow-2xl overflow-hidden">
              <div className="h-full overflow-y-auto pb-20 no-scrollbar">
                {activeTab === 'flights' && (
                    <div className="bg-[#2B3445] pt-6 pb-12 px-6 rounded-b-[2.5rem] mb-[-2rem] relative z-0">
                        <div className="grid grid-cols-2 gap-4 mb-2">
                            <div className="bg-[#E0CFC3]/10 border border-[#E0CFC3]/20 rounded-2xl p-3 flex flex-col items-center justify-center backdrop-blur-sm">
                                <div className="flex items-center gap-1.5 mb-1">
                                    <CloudSun className="w-5 h-5 text-[#E94D34]" />
                                    <span className="text-[#E0CFC3] text-xs font-bold">福岡天氣</span>
                                </div>
                                {loading ? (
                                  <RefreshCw className="w-6 h-6 text-[#E0CFC3] animate-spin my-1" />
                                ) : (
                                  <>
                                    <div className="text-2xl font-black text-white">{weatherData?.temp ?? '--'}°<span className="text-sm font-normal text-[#E0CFC3]/80">C</span></div>
                                    <span className="text-[10px] text-[#E0CFC3]/60 mt-0.5">{weatherData?.desc ?? '載入中'}</span>
                                  </>
                                )}
                            </div>

                            <div className="bg-[#E0CFC3]/10 border border-[#E0CFC3]/20 rounded-2xl p-3 flex flex-col items-center justify-center backdrop-blur-sm">
                                <div className="flex items-center gap-1.5 mb-1">
                                    <Coins className="w-4 h-4 text-[#E94D34]" />
                                    <span className="text-[#E0CFC3] text-xs font-bold">即時匯率</span>
                                </div>
                                {loading ? (
                                  <RefreshCw className="w-6 h-6 text-[#E0CFC3] animate-spin my-1" />
                                ) : (
                                  <>
                                    <div className="text-2xl font-black text-white">{exchangeRate ? exchangeRate.toFixed(3) : '--'}</div>
                                    <span className="text-[10px] text-[#E0CFC3]/60 mt-0.5">JPY / TWD</span>
                                  </>
                                )}
                            </div>
                        </div>
                        <p className="text-center text-[#E0CFC3]/40 text-[10px] mt-2 flex items-center justify-center gap-1">
                            <Clock className="w-3 h-3" />
                            <span>數據更新中...</span>
                        </p>
                    </div>
                )}
                
                <div className="relative z-10">
                    {activeTab === 'flights' && <FlightsView />}
                    {activeTab === 'itinerary' && <ItineraryView />}
                    {activeTab === 'notes' && <NotesView />}
                    {activeTab === 'checklist' && <ChecklistView />}
                </div>
              </div>

              <div className="fixed bottom-0 w-full max-w-md bg-white/95 backdrop-blur-md border-t border-[#E0CFC3] pb-6 pt-2 px-4 flex justify-between z-40 shadow-[0_-4px_10px_rgba(43,52,69,0.05)]">
                <TabButton active={activeTab === 'flights'} onClick={() => setActiveTab('flights')} icon={<Plane className="w-6 h-6" />} label="航班" />
                <TabButton active={activeTab === 'itinerary'} onClick={() => setActiveTab('itinerary')} icon={<Calendar className="w-6 h-6" />} label="行程" />
                <TabButton active={activeTab === 'notes'} onClick={() => setActiveTab('notes')} icon={<FileText className="w-6 h-6" />} label="提醒" />
                <TabButton active={activeTab === 'checklist'} onClick={() => setActiveTab('checklist')} icon={<CheckSquare className="w-6 h-6" />} label="待辦" />
              </div>

              {showVegCard && (
                <div className="fixed inset-0 z-50 flex items-center justify-center bg-[#2B3445]/90 p-6 backdrop-blur-sm" onClick={() => setShowVegCard(false)}>
                  <div className="bg-white p-6 rounded-2xl w-full max-w-sm shadow-2xl transform transition-all scale-100 border-4 border-[#E94D34]" onClick={e => e.stopPropagation()}>
                    <div className="flex justify-between items-center mb-6 border-b border-[#E0CFC3] pb-4">
                      <h3 className="text-xl font-bold text-[#2B3445]">飲食需求卡</h3>
                      <button onClick={() => setShowVegCard(false)} className="p-2 bg-[#E0CFC3]/30 rounded-full hover:bg-[#E0CFC3]">
                        <X className="w-5 h-5 text-[#2B3445]" />
                      </button>
                    </div>
                    
                    <div className="space-y-6">
                      <div className="p-4 bg-[#F5EFE9] rounded-xl border-l-4 border-[#E94D34]">
                        <p className="text-xs text-[#2B3445]/50 mb-1 uppercase tracking-wider font-bold">Japanese</p>
                        <p className="text-lg font-bold text-[#2B3445] leading-relaxed">
                          すみません、<br/>ネギや玉ねぎ、にんにくなど<br/>入っていますか。<br/>それも食べられませんので、<br/>入っていれば、抜いていただけませんか。
                        </p>
                      </div>
                      
                      <div className="p-4 bg-white rounded-xl border border-[#E0CFC3] border-l-4 border-l-[#2B3445]">
                        <p className="text-xs text-[#2B3445]/50 mb-1 uppercase tracking-wider font-bold">Chinese (Traditional)</p>
                        <p className="text-base text-[#2B3445]">
                          不好意思，請問有加蔥、洋蔥或大蒜嗎？<br/>這些我也沒辦法吃。<br/>如果有的話，可以幫我拿掉嗎？
                        </p>
                      </div>
                    </div>
                    <p className="text-center text-xs text-[#2B3445]/40 mt-6">請出示此畫面給餐廳服務人員確認</p>
                  </div>
                </div>
              )}
            </div>
          );
        }

        // Render App
        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
