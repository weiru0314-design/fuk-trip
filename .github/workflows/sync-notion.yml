name: Sync Notion Checklist

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch and parse Notion data
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        run: |
          curl -s -X POST "https://api.notion.com/v1/databases/35780191cf29803ea4b0f3f421854632/query" \
            -H "Authorization: Bearer $NOTION_TOKEN" \
            -H "Content-Type: application/json" \
            -H "Notion-Version: 2022-06-28" \
            -d '{"sorts":[{"property":"分類","direction":"ascending"}]}' \
            -o raw.json

          python3 parse_notion.py

          echo "=== checklist.json ==="
          cat checklist.json

      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add checklist.json
          git diff --cached --quiet || git commit -m "🔄 sync: update checklist from Notion"
          git push
