name: Sync Notion Checklist

on:
  schedule:
    - cron: '*/30 * * * *'  # 每 30 分鐘自動同步
  workflow_dispatch:          # 允許手動觸發
  push:
    branches: [main]

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch Notion Checklist
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        run: |
          curl -s -X POST "https://api.notion.com/v1/databases/35780191cf29803ea4b0f3f421854632/query" \
            -H "Authorization: Bearer $NOTION_TOKEN" \
            -H "Content-Type: application/json" \
            -H "Notion-Version: 2022-06-28" \
            -d '{"sorts":[{"property":"分類","direction":"ascending"}]}' \
            > raw.json

          python3 - <<'EOF'
          import json

          with open("raw.json") as f:
              data = json.load(f)

          items = []
          for page in data.get("results", []):
              props = page["properties"]
              name = props.get("待辦事項", {}).get("title", [{}])
              name = name[0].get("plain_text", "") if name else ""
              checked = props.get("完成狀態", {}).get("checkbox", False)
              category = props.get("分類", {}).get("select", {})
              category = category.get("name", "") if category else ""
              items.append({
                  "pageId": page["id"],
                  "text": name,
                  "checked": checked,
                  "category": category
              })

          with open("checklist.json", "w", encoding="utf-8") as f:
              json.dump(items, f, ensure_ascii=False, indent=2)

          print(f"✅ 已同步 {len(items)} 筆待辦事項")
          EOF

      - name: Commit updated checklist
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add checklist.json
          git diff --cached --quiet || git commit -m "🔄 sync: update checklist from Notion"
          git push
